<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar - Webdev Mastery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = { theme: { extend: { colors: { primary: { 50: '#eff6ff', 100: '#dbeafe', 600: '#2563eb', 700: '#1d4ed8' } } } } }
    </script>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8 relative overflow-hidden">
    <!-- Decorative Blobs -->
    <div class="absolute top-[-10%] right-[-10%] w-96 h-96 bg-primary-200 rounded-full mix-blend-multiply filter blur-3xl opacity-50 animate-float"></div>
    <div class="absolute top-[20%] left-[-10%] w-96 h-96 bg-orange-200 rounded-full mix-blend-multiply filter blur-3xl opacity-50 animate-float" style="animation-delay: 2s;"></div>

    <div class="max-w-md w-full relative z-10">
        <!-- Logo -->
        <div class="flex justify-center mb-6">
            <a href="../index.html" class="flex items-center gap-2 group">
                <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-primary-600 to-blue-400 flex items-center text-white justify-center shadow-lg transform group-hover:scale-105 transition">
                    <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path></svg>
                </div>
            </a>
        </div>
        
        <!-- Card -->
        <div class="bg-white/90 backdrop-blur-xl rounded-3xl shadow-2xl border border-white p-8 sm:p-10">
            <h2 class="text-3xl font-extrabold text-slate-900 text-center mb-2 tracking-tight">Buat Akun Baru</h2>
            <p class="text-sm text-center text-slate-500 mb-8 font-medium">Mulai perjalanan karir IT mu hari ini!</p>

            <form class="space-y-5" action="dashboard.html" method="GET">
                <div>
                    <label for="name" class="block text-sm font-semibold text-slate-700 mb-1.5">Nama Lengkap</label>
                    <input id="name" name="name" type="text" required class="appearance-none relative block w-full px-4 py-3 border border-slate-300 placeholder-slate-400 text-slate-900 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-primary-500 sm:text-sm shadow-sm transition" placeholder="John Doe">
                </div>
                <div>
                    <label for="email" class="block text-sm font-semibold text-slate-700 mb-1.5">Alamat Email</label>
                    <input id="email" name="email" type="email" required class="appearance-none relative block w-full px-4 py-3 border border-slate-300 placeholder-slate-400 text-slate-900 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-primary-500 sm:text-sm shadow-sm transition" placeholder="anda@email.com">
                </div>
                <div>
                    <label for="password" class="block text-sm font-semibold text-slate-700 mb-1.5">Kata Sandi</label>
                    <input id="password" name="password" type="password" required class="appearance-none relative block w-full px-4 py-3 border border-slate-300 placeholder-slate-400 text-slate-900 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-primary-500 sm:text-sm shadow-sm transition" placeholder="Min. 8 Karakter">
                </div>
                
                <div class="pt-2">
                    <button type="submit" class="w-full flex justify-center py-3.5 px-4 border border-transparent text-sm font-bold rounded-xl text-white bg-slate-900 hover:bg-slate-800 transition shadow-lg transform hover:-translate-y-0.5">
                        Daftar Akun
                    </button>
                </div>
            </form>

            <div class="mt-8 text-center text-sm font-medium text-slate-500">
                Sudah punya akun? 
                <a href="login.html" class="font-bold text-primary-600 hover:text-primary-500 transition">Masuk di sini</a>
            </div>
            <div class="mt-6">
                <a href="../index.html" class="text-xs text-slate-400 hover:text-slate-600 transition block text-center">&larr; Kembali ke Beranda</a>
            </div>
        </div>
    </div>
</body>
</html>
